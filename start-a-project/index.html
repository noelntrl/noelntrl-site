<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>noelntrl — start a project</title>
<link rel="icon" type="image/png" href="/ASSETS/Logo/web logo.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=Young+Serif&display=swap');
  :root{
    --bg:#0a0a0a; --bg-card:#141414; --line:#262626; --line-soft:#1c1c1c;
    --text:#f2f2ee; --text-dim:#8c8c86; --text-faint:#5c5c57; --accent:#d8a14a;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--text); font-family:'Inter', sans-serif; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:720px; margin:0 auto; padding:0 40px;}
  .wrap-nav{max-width:1180px; margin:0 auto; padding:0 40px;}
  nav{display:flex; align-items:baseline; justify-content:space-between; padding:28px 0; border-bottom:1px solid var(--line-soft);}
  .logo{font-family:'Young Serif', serif; font-size:24px; font-weight:400; letter-spacing:-0.01em; color:var(--text); text-decoration:none;}
  .nav-links{display:flex; gap:36px; font-size:14px; color:var(--text-dim);}
  .nav-links a{color:var(--text-dim); text-decoration:none;}
  .nav-icons{display:flex; gap:18px; font-size:14px; color:var(--text-dim);}
  .nav-icons a{color:inherit; text-decoration:none;}
  .nav-icons a:hover{color:var(--text);}
  .nav-dropdown{position:relative; padding-bottom:14px;}
  .dropdown-menu{
    display:none; position:absolute; top:100%; left:0; margin-top:0;
    background:var(--bg-card); border:1px solid var(--line); border-radius:4px;
    padding:8px 0; min-width:170px; z-index:10;
  }
  .nav-dropdown:hover .dropdown-menu{display:block;}
  .dropdown-menu a{
    display:block; padding:9px 18px; font-family:'Fraunces', serif; font-size:15px;
    color:var(--text-dim); text-decoration:none; white-space:nowrap;
  }
  .dropdown-menu a:hover{color:var(--text); background:var(--line-soft);}
  .dropdown-menu a.active{color:var(--text);}
  .nav-icons img{width:32px; height:32px; display:block;}

  .hero{padding:70px 0 40px;}
  .eyebrow{font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-faint); margin-bottom:16px; font-weight:500;}
  h1{font-family:'Fraunces', serif; font-weight:500; font-size:36px; line-height:1.15; letter-spacing:-0.01em; margin-bottom:12px;}
  .hero-sub{font-size:15px; color:var(--text-dim); line-height:1.5;}

  form{padding-bottom:80px;}
  .field{margin-bottom:24px;}
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  label{display:block; font-size:13px; color:var(--text-dim); margin-bottom:8px;}
  input, textarea{
    width:100%; background:var(--bg-card); border:1px solid var(--line); border-radius:4px;
    padding:13px 14px; color:var(--text); font-family:'Inter',sans-serif; font-size:14px;
  }
  input:focus, textarea:focus{outline:none; border-color:var(--accent);}
  textarea{resize:vertical; min-height:120px;}
  ::placeholder{color:var(--text-faint);}

  .submit-btn{
    display:inline-block; background:var(--text); color:#0a0a0a; border:none;
    font-size:14px; font-weight:500; padding:14px 28px; border-radius:3px;
    cursor:pointer; margin-top:8px;
  }

  .confirm{display:none; padding:70px 0; text-align:center;}
  .confirm h2{font-family:'Fraunces', serif; font-size:26px; margin-bottom:10px;}
  .confirm p{font-size:14px; color:var(--text-dim);}

  footer{padding:50px 0; display:flex; justify-content:center; align-items:center;}
  .footer-cta{font-size:16px; color:var(--text-dim);}
</style>
</head>
<body>

<div class="wrap-nav">
  <nav>
    <a class="logo" href="/">noelntrl</a>
    <div class="nav-links">
      <a href="/performance-creative">Performance creative</a>
      <a href="/campaigns">Campaigns</a>
      <div class="nav-dropdown">
        <a href="#">Work</a>
        <div class="dropdown-menu">
          <a href="/leon-goods-case-study">LEÒN Goods</a>
          <a href="/bfrc-case-study">BFRC</a>
          <a href="/amore-pacific-case-study">Amore Pacific</a>
        </div>
      </div>
    </div>
    <div class="nav-icons"><a href="https://www.instagram.com/noelntrl/" target="_blank" rel="noopener"><img src="/ASSETS/Logo/instagram logo.png" alt="Instagram"></a></div>
  </nav>
</div>

<div class="wrap">
  <section class="hero">
    <div class="eyebrow">Start a project</div>
    <h1>Start a project</h1>
    <p class="hero-sub">Fill this out and I'll reply within 24 hours.</p>
  </section>

  <form id="projectForm">
    <div class="field field-row">
      <div>
        <label for="firstName">First Name (required)</label>
        <input type="text" id="firstName" name="First Name" required>
      </div>
      <div>
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" name="Last Name">
      </div>
    </div>

    <div class="field">
      <label for="email">Email (required)</label>
      <input type="email" id="email" name="Email" required>
    </div>

    <div class="field">
      <label for="subject">Subject (required)</label>
      <input type="text" id="subject" name="Subject" required>
    </div>

    <div class="field">
      <label for="message">What are you working on? (required)</label>
      <textarea id="message" name="Message" required></textarea>
    </div>

    <button type="submit" class="submit-btn">Submit</button>
  </form>

  <div class="confirm" id="confirmMsg">
    <h2>Thank you — reply within 24 hours.</h2>
  </div>
</div>

<div class="wrap-nav">
  <footer>
    <div class="footer-cta">noel@noelntrl.com</div>
  </footer>
</div>

<script>
document.getElementById('projectForm').addEventListener('submit', function(e){
  e.preventDefault();
  var form = document.getElementById('projectForm');
  var submitBtn = form.querySelector('.submit-btn');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Sending…';

  fetch('https://formsubmit.co/ajax/noel@noelntrl.com', {
    method: 'POST',
    headers: { 'Accept': 'application/json' },
    body: new FormData(form)
  })
  .then(function(res){ return res.json(); })
  .then(function(){
    form.style.display = 'none';
    document.getElementById('confirmMsg').style.display = 'block';
  })
  .catch(function(){
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit';
    alert("Something went wrong sending your message — please email hello@noelntrl.com directly.");
  });
});
</script>

</body>
</html>
