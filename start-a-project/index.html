<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>noelntrl — start a project</title>
<link rel="icon" type="image/png" href="/ASSETS/Logo/web logo.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500&family=Young+Serif&display=swap');

  :root{
    --bg:#0a0a0a;
    --fg:#efece5;
    --dim:#7d7a73;
    --faint:#3a3833;
    --accent:#c9a96a;
    --line:rgba(239,236,229,0.10);
    --card:#111110;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);color:var(--fg);
    font-family:'Inter',sans-serif;font-weight:300;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;
  }
  ::selection{background:var(--accent);color:#0a0a0a;}
  a{text-decoration:none;color:inherit;}
  .wrap{max-width:1240px;margin:0 auto;padding:0 42px;}
  .narrow{max-width:640px;margin:0 auto;padding:0 42px;}

  /* NAV */
  nav{
    position:fixed;top:0;left:0;right:0;z-index:50;
    display:flex;align-items:center;justify-content:space-between;
    padding:24px 42px;mix-blend-mode:difference;
  }
  nav .logo{font-family:'Young Serif',serif;font-size:22px;letter-spacing:-.01em;color:#efece5;}
  .nav-links{display:flex;gap:32px;font-size:12px;letter-spacing:.5px;color:#efece5;}
  .nav-links a{opacity:.6;transition:opacity .3s;}
  .nav-links a:hover,.nav-links a.active{opacity:1;}
  .nav-dropdown{position:relative;}
  .dropdown-menu{
    display:none;position:absolute;top:100%;left:50%;transform:translateX(-50%);padding-top:14px;min-width:150px;
  }
  .nav-dropdown:hover .dropdown-menu{display:block;}
  .dropdown-menu .inner{
    background:#121110;border:1px solid var(--line);padding:6px 0;
  }
  .dropdown-menu a{
    display:block;padding:9px 14px;font-family:'Fraunces',serif;font-size:14px;
    color:var(--dim);opacity:1;transition:color .2s,background .2s;white-space:nowrap;
  }
  .dropdown-menu a:hover{color:var(--fg);background:rgba(239,236,229,.04);}

  /* HERO */
  .hero{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:170px 42px 70px;max-width:900px;margin:0 auto;
    text-align:center;
  }
  .hero .mark{
    font-family:'Young Serif',serif;font-size:22px;color:var(--fg);
    margin-bottom:30px;opacity:0;animation:fade 1s .05s forwards;
  }
  .hero .eyebrow{
    font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--dim);
    margin-bottom:34px;overflow:hidden;
  }
  .hero .eyebrow span{display:inline-block;transform:translateY(120%);animation:rise 1s .1s cubic-bezier(.2,.7,.2,1) forwards;}
  .hero h1{
    font-family:'Fraunces',serif;font-weight:300;
    font-size:clamp(28px,5vw,64px);line-height:1.3;letter-spacing:-.02em;
    white-space:nowrap;
  }
  .hero h1 .word{display:block;overflow:hidden;}
  .hero h1 .word i{display:inline-block;transform:translateY(110%);font-style:normal;}
  .hero h1 .l1 i{animation:rise 1.1s .22s cubic-bezier(.2,.7,.2,1) forwards;}
  .hero h1 .l2 i{animation:rise 1.1s .32s cubic-bezier(.2,.7,.2,1) forwards;}
  .hero h1 em{font-style:italic;font-weight:400;color:var(--dim);}
  .hero .sub{
    max-width:480px;margin-top:24px;
    opacity:0;animation:fade 1s .85s forwards;
  }
  .hero .sub p{font-size:15px;line-height:1.7;color:var(--dim);}

  @keyframes rise{to{transform:translateY(0);}}
  @keyframes fade{to{opacity:1;}}

  /* FORM */
  .form-section{padding:20px 0 130px;border-top:1px solid var(--line);margin-top:20px;}
  form{padding-top:70px;}
  .field{margin-bottom:22px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  label{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:10px;}
  input,textarea{
    width:100%;background:var(--card);border:1px solid var(--line);border-radius:4px;
    padding:14px 16px;color:var(--fg);font-family:'Inter',sans-serif;font-weight:300;font-size:14px;
    transition:border-color .3s;
  }
  input:focus,textarea:focus{outline:none;border-color:var(--accent);}
  textarea{resize:vertical;min-height:130px;}
  ::placeholder{color:var(--faint);}

  .submit-btn{
    display:inline-block;font-size:12px;letter-spacing:2px;text-transform:uppercase;
    border:1px solid var(--line);border-radius:40px;padding:16px 34px;
    background:var(--fg);color:var(--bg);border-color:var(--fg);
    transition:background .4s,color .4s,border-color .4s;
    cursor:pointer;margin-top:8px;font-family:'Inter',sans-serif;
  }
  .submit-btn:hover{background:transparent;color:var(--fg);border-color:var(--line);}
  .submit-btn:disabled{opacity:.5;cursor:default;}

  .confirm{display:none;padding-top:70px;text-align:center;}
  .confirm h2{
    font-family:'Fraunces',serif;font-weight:300;
    font-size:clamp(26px,3.4vw,38px);letter-spacing:-.01em;margin-bottom:14px;
  }
  .confirm p{font-size:14px;color:var(--dim);}

  /* FOOTER */
  footer{border-top:1px solid var(--line);padding:44px 0;}
  .foot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;}
  .foot .logo{font-family:'Young Serif',serif;font-size:18px;}
  .foot .fmail{font-size:14px;color:var(--dim);}
  .foot .fmail:hover{color:var(--fg);}
  .foot .fmeta{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);}

  /* reveal */
  .reveal{opacity:0;transform:translateY(36px);transition:opacity 1s cubic-bezier(.2,.7,.2,1),transform 1s cubic-bezier(.2,.7,.2,1);}
  .reveal.in{opacity:1;transform:none;}
  .reveal.d1{transition-delay:.1s;}

  @media(max-width:860px){
    nav{padding:18px 24px;}
    .nav-links{gap:16px;}
    .narrow{padding:0 24px;}
    .hero{padding:130px 24px 50px;}
    .field-row{grid-template-columns:1fr;}
  }
  @media(prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important;}
    .reveal{opacity:1;transform:none;}
    .hero .eyebrow span,.hero h1 .word i{transform:none;}
    .hero .sub{opacity:1;}
  }
</style>
</head>
<body>

<nav>
  <a class="logo" href="/">noelntrl</a>
  <div class="nav-links">
    <a href="/performance-creative">Ad creative</a>
    <a href="/campaigns">Brand Campaign</a>
    <div class="nav-dropdown">
      <a href="/#work">Work</a>
      <div class="dropdown-menu"><div class="inner">
        <a href="/amore-pacific-case-study">Amore Pacific</a>
        <a href="/bfrc-case-study">BFRC</a>
        <a href="/leon-goods-case-study">LEÒN Goods</a>
      </div></div>
    </div>
    <a href="https://www.instagram.com/noelntrl/" target="_blank" rel="noopener">Instagram</a>
  </div>
</nav>

<!-- HERO -->
<header class="hero">
  <div class="mark">noelntrl</div>
  <h1>
    <span class="word l1"><i>Let's start the <em>project.</em></i></span>
  </h1>
  <div class="sub">
    <p>Fill this out and I'll reply within 24 hours.</p>
  </div>
</header>

<div class="narrow form-section">
  <form id="projectForm">
    <div class="field field-row">
      <div>
        <label for="firstName">First Name (required)</label>
        <input type="text" id="firstName" name="First Name" required>
      </div>
      <div>
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" name="Last Name">
      </div>
    </div>

    <div class="field">
      <label for="email">Email (required)</label>
      <input type="email" id="email" name="Email" required>
    </div>

    <div class="field">
      <label for="subject">Subject (required)</label>
      <input type="text" id="subject" name="Subject" required>
    </div>

    <div class="field">
      <label for="message">What are you working on? (required)</label>
      <textarea id="message" name="Message" required></textarea>
    </div>

    <button type="submit" class="submit-btn">Submit</button>
  </form>

  <div class="confirm" id="confirmMsg">
    <h2>Thank you — <em>I'll reply within 24 hours.</em></h2>
    <p>Talk soon.</p>
  </div>
</div>

<footer>
  <div class="wrap foot">
    <span class="logo">noelntrl</span>
    <a class="fmail" href="mailto:noel@noelntrl.com">noel@noelntrl.com</a>
    <span class="fmeta">Seoul — Campaign &amp; ad creative</span>
  </div>
</footer>

<script>
document.getElementById('projectForm').addEventListener('submit', function(e){
  e.preventDefault();
  var form = document.getElementById('projectForm');
  var submitBtn = form.querySelector('.submit-btn');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Sending…';

  fetch('https://formsubmit.co/ajax/noel@noelntrl.com', {
    method: 'POST',
    headers: { 'Accept': 'application/json' },
    body: new FormData(form)
  })
  .then(function(res){ return res.json(); })
  .then(function(){
    form.style.display = 'none';
    document.getElementById('confirmMsg').style.display = 'block';
  })
  .catch(function(){
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit';
    alert("Something went wrong sending your message — please email hello@noelntrl.com directly.");
  });
});
</script>

</body>
</html>
